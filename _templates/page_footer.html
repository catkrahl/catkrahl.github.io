<script src="jquery/jquery-2.x.min.js"></script>
<script src="js/fixed-responsive-nav.js"></script>
<script src="js/aos.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://conceptsandtraining.zammad.com/assets/chat/chat.min.js"></script>

<script>
    // responsive nav
    $(function() {
        $(window).on("scroll", function() {
            if($(window).scrollTop() > 50) {
                $(".header").addClass("active");
            } else {
                //remove the background property so it comes transparent again (defined in your css)
            $(".header").removeClass("active");
            }
        });
    });
</script>

<script>
    AOS.init({
        
    });
</script>

<script>
    /* logo swiper configuration */
    var swiper = new Swiper(".logoSwiper", {
        slidesPerView: 1,
        centeredSlides: false,
        spaceBetween: 20,
        slidesPerGroupSkip: 1,
        loop: true,
        keyboard: {
            enabled: true,
        },
        autoplay: {
            delay: 2500,
            disableOnInteraction: false,
        },
        breakpoints: {
            769: {
            slidesPerView: 2,
            slidesPerGroup: 1,
            },
            990: {
            slidesPerView: 3,
            slidesPerGroup: 1,
            },
        },
    });

    var swiper = new Swiper(".bannerSwiper", {
        slidesPerView: 1,
        centeredSlides: false,
        spaceBetween: 0,
        slidesPerGroupSkip: 1,
        loop: true,
        speed: 700,
        keyboard: {
            enabled: true,
        },
        autoplay: {
            delay: 2500,
            disableOnInteraction: false,
        },
    });

    var swiper = new Swiper(".cardSwiper", {
        slidesPerView: 1,
        centeredSlides: false,
        spaceBetween: 20,
        slidesPerGroupSkip: 1,
        loop: true,
        grabCursor: true,
        keyboard: {
            enabled: true,
        },
        breakpoints: {
            769: {
            slidesPerView: 2,
            slidesPerGroup: 1,
            },
            990: {
            slidesPerView: 3,
            slidesPerGroup: 1,
            },
        },
        scrollbar: {
            el: ".swiper-scrollbar",
        },
        navigation: {
            nextEl: ".swiper-button-next",
            prevEl: ".swiper-button-prev",
        },
        pagination: {
            el: ".swiper-pagination",
            clickable: true,
            dynamicBullets: "true",
        },
    });

</script>

<script>
    $(function() {
        new ZammadChat ({
            background: '#c0c0c0',
            fontSize: '12px',
            chatId: 1
        });
    });
</script>

</body>
</html>
