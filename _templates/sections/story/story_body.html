<div class="btn-nav prev" onclick="window.location.href='{{link_target}}';"></div>

<!-- banner slider -->
<section id="banner-slider" class="banner-slider">
    <div class="swiper bannerSwiper">
        <div class="swiper-wrapper">
            {% for banner_slide in banner_slides %}
            <div class="swiper-slide">
                <img src="{{ banner_slide.image }}" alt="Learning Management">
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<section id="storyhead" class="storybanner {{ department }}">
    <div class="text-overlay">

        <!-- Overlay Text -->
        <h2 class="font-bg white"><span>CaT</span><br><span>Storys</span></h1>
        <h3 class="font-bg"><span>{{ title }}</span></h1>

    </div>
</section>

<section id="content" class="story-content {{ department }}">
    <div class="bg innerspace hero">
        <div class="container">
            <div class="row">
                <div class="col-sm-12 story-content-head">
                    <!-- 
                    <div class="navigator"> 
                        <div class="element-container flex flex-row">
                            <div class="float-element"></div>
                            <div class="float-element active"></div>
                            <div class="float-element"></div>
                        </div>
                    </div>
                    -->
                    <div class="spacer-md"></div>
                    <div id="content-anchor" class="anchor-target"></div>
                    <h3>{{ subline }}</h3>
                    <h1>{{ headline }}</h1>
                </div>

                <div class="col-sm-12">
                    <img class="mtb-lg rounded" src="{{ image_above_text }}">
                </div>

                <!-- col 1 -->
                <div class="col-sm-12 col-md-6">
                    {{ col1|markdown_to_html }}
                </div>
                
                <!-- col 2 -->
                <div class="col-sm-12 col-md-6">
                    {{ col2|markdown_to_html }}
                    <p><a href="{{ link_target }}" target="_self" class="link font-bg"><span>{{ link_label }}</span></a></p>
                </div>
                <div class="col-sm-12">
                    <img class="mtb-lg rounded" src="{{ image_below_text }}">
                </div>
            </div>
        </div>
    </div>
</section>
