<div class="btn-nav prev" onclick="window.location.href='{{ link_target }}';"></div>

<section id="storyhead" class="storyhead {{ department }}">
    <!-- Overlay Text -->
    <h4 class="font-bg white"><span>{{ subtitle }}</span></h4>
    <h2 class="font-bg"><span>{{ title }}</span></h1>
</section>

<section id="content">
    <div class="bg innerspace hero">
        <div class="container">
            <div class="row">
                <div class="col-sm-12">
                    <div class="navigator">
                        <div class="element-container flex flex-row">
                            <div class="float-element"></div>
                            <div class="float-element active"></div>
                            <div class="float-element"></div>
                        </div>
                    </div>
                    <div class="spacer-md"></div>
                    <div id="content-anchor" class="anchor-target"></div>
                    <h3>{{ subline }}</h3>
                    <h2>{{ headline }}</h2>
                </div>
                <!-- col 1 -->
                <div class="col-sm-12 col-md-6">
                    {{ col1|markdown_to_html }}
                    <p><a href="{{ link_target }}" traget="_self" class="link">{{ link_label }}</a></p>
                </div>

                <!-- col 2 -->
                <div class="col-sm-12 col-md-6">
                    {{ col2|markdown_to_html }}
                </div>
            </div>
        </div>
    </div>
</section>
