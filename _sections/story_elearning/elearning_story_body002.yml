subline: Erklärfilme
headline: Die Kunst der Vereinfachung
col1: |
  Ein Schreibtisch, ein Stuhl, eine Pflanze betreten die Bühne, dazu kommen 
  die Uhr und eine Stehlampe und schließlich: der Mensch. Das Drehbuch ist 
  abgestimmt, finalisert, freigegeben und mit dem Produzenten besprochen und 
  damit sind alle Voraussetzungen erfüllt, um in der App recht schnell Neues 
  entstehen zu lassen: ein Büro, ein Geschäft, eine Agentur oder vielleicht 
  auch ein Garten, auf jeden Fall ein individueller Raum, den wir aus einer 
  stetig wachsenden Bibliothek auswählen und nach den Wünschen unserer Kunden 
  gestalten.  

  Jedes Element, einmal gezeichnet, verschlagwortet und abgelegt, kann nach der 
  Herstellung immer wieder verwendet, aber durch eigene Farbgebung und Merkmale 
  individualisiert werden. Auf diese Weise machen wir es möglich, für unsere Kunden 
  ohne massiven Kosteneinsatz Erklärfilme zu produzieren. Diese lassen sich auf 
  allen Ebenen einsetzen - bei der internen wie externen Kommunikation, um Produkte, 
  Anwendungen oder Prozesse zu erklären, um das Onboarding zu gestalten oder sehr 
  trockene Themen sehr unterhaltsam zu machen.
col2: |
  Sich auf eine Ebene mit den Zuschauer\*innen zu begeben, so zu sein, wie sie und wir 
  selbst sind und wie wir im Alltag Freund\*innen ein Thema erklären würden – das ist 
  die absolute Kunst des Erklärfilms. Wir lieben ihn – weil er so vereinfacht, nicht 
  drumherum redet, mit Interaktionen (z.B. Frageunterbrechungen) versehen werden kann 
  und weil er als auflockerndes Element im Großen und Ganzen (etwa innerhalb einer 
  Blended-Learning-Strategie) flexibel seinen Platz finden und immer wieder anders 
  geordnet werden kann.  

  Wir erklären ein komplexes Thema in 30, 60 oder 90 Minuten. Sprechen Sie uns an!
