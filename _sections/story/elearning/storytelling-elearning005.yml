headline: Das Drehbuch
image_above_text: 
image_below_text: 
image_col1:
image_col2:
col1: |
  Ein Messer gelangt ins Flugzeug, weil der Angestellte der Lebensmittelversorgung vergessen hat, eine Tür zu schließen. Ein Vermittler hat bei der Beratung eine Versicherung nicht empfohlen und nun hat seine Kundin einen Unfall, bei dem sie nicht abgesichert ist. Eine Mitarbeiterin steigt auf einen Drehstuhl, um einen Ordner im Regal zu erreichen, und stürzt dabei. Das sind ganz konkrete Szenarien, die sich in der Realität unserer Kunden abspielen und die wir in unseren Drehbüchern für Content-Produktionen verarbeiten.   

  Denn das (Arbeits-)Leben schreibt die unmöglichsten Geschichten und oft ist das so, weil Menschen an Gewohnheiten festhalten, eigene intuitive Annahmen treffen oder den Sinn von Regeln und Richtlinien nicht verstehen. Solch starre Schemata zu durchbrechen, erreichen wir im digitalen Training nicht durch Erklärung, sondern durch emotionales Erleben, durch involviert sein.  

col2: |
  Das gelingt natürlich am besten in Filmen, Geschichten. Nirgendwo sonst wird sie so stark spürbar: die Angst des Angestellten, der vergessen hat, die Tür zu schließen, die Scham des Vermittlers, der seiner Kundin erläutern muss, dass sie in ihrer Notlage keine Unterstützung erhält.  

  Wir haben für Szenarien mit starken Überzeugungsmomenten verschiedenste Konzepte entwickelt. Filme mit Frageunterbrechungen und Falschverläufen, illustrierte Erklärfilme, Kurzfilme mit überraschendem Wendepunkt oder Bildgeschichten – eingebettet zwischen Wissensvermittlung, Quizzes und vertiefenden Sequenzen.
  
