headline: Der „Faktor Mensch“ in der IT
image_above_text:
image_below_text: 
col1: |
  Es sind die täglichen Herausforderungen in der IT\: In einem Konzern kommen die automatisierten E-Mails nicht an, die das Lernmanagementsystem verschickt. Ein Unternehmen hat einen ausreichend großen Festplattenspeicher für den Systembetrieb und trotzdem ist die Kapazitäten-Grenze schon fast erreicht. Das kann eigentlich nicht sein und doch …  

  Herausforderungen wie diese begegnen Menschen in der Welt von Software und IT – und eben auch beim Betrieb eines Lernmanagementsystems. Denn wo immer der „Faktor Mensch“ und Wechselwirkungen mit anderen Systemen zusammenkommen, sind eben Unwägbarkeiten im Spiel. Niemand sollte kleinreden, dass es diese Themen gibt, auch wir wollen das nicht. Wir möchten an dieser Stelle aber herausstellen, dass wir auf einen professionellen Umgang mit diesen vorbereitet sind.  
col2: |
  Wir arbeiten in Fällen wie den oben beschriebenen eng mit der unternehmenseigenen IT und auch mit den eventuell weiteren involvierten Software-Providern oder -Anbietern zusammen, um eine individuelle Lösung für das jeweilige Thema bereitstellen zu können.  

  Und so wie der „Faktor Mensch“ eben für Unwägbarkeiten sorgt – mit ihm lässt sich am Ende aber auch 99 Prozent der Probleme in den Griff bekommen. So auch im Fall der „verschollenen“ E-Mails. Es zeigte sich, dass die Mitarbeitenden viele unterschiedliche Mailprovider nutzen, von denen manche die automatisierten Einladungsmails für Anmeldungen zum Training ablehnen. Das Problem war gefunden, Einstellungen wurden geändert – und die E-Mails kamen an.  
